name: Package

on:
    push:
        tags: ['v*']

permissions: write-all

jobs:
    change-version:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.outputstep.outputs.VERSION }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Resolve version
              id: outputstep
              run: |
                  VERSION="$(git describe --tags | sed 's/-[0-9]*-.*//g' | sed 's/^v//')"
                  echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Change version
              run: |
                  VERSION="${{ steps.outputstep.outputs.VERSION }}"

                  tmp="$(mktemp)"
                  jq --arg version "$VERSION" '.version = $version' package.json > "$tmp" && mv "$tmp" package.json

                  tmp="$(mktemp)"
                  jq --arg version "$VERSION" '.version = $version' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json

                  sed -i "0,/version = \".*\"/s//version = \"${VERSION}\"/" src-tauri/Cargo.toml

                  echo "${VERSION}"

            - name: Upload source
              uses: actions/upload-artifact@v4
              with:
                  name: source
                  path: ./*
                  include-hidden-files: true
                  if-no-files-found: error

    build-extension:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Build SnipDo extension
              run: |
                  cd .scripts/snipdo
                  bash ./build.sh

            - name: Upload SnipDo artifact
              uses: actions/upload-artifact@v4
              with:
                  name: neopot.pbar
                  path: .scripts/snipdo/neopot.pbar
                  if-no-files-found: error

            - name: Upload SnipDo release asset
              if: startsWith(github.ref, 'refs/tags')
              uses: softprops/action-gh-release@v1
              with:
                  body_path: CHANGELOG
                  token: ${{ secrets.GITHUB_TOKEN }}
                  overwrite_files: true
                  files: .scripts/snipdo/neopot.pbar

    build-for-windows:
        needs: change-version
        runs-on: windows-latest
        env:
            WINDOWS_ARCH: x64
            WINDOWS_TARGET: x86_64-pc-windows-msvc
            WINDOWS_TOOLCHAIN: stable-x86_64-pc-windows-msvc
        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: source

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Install Rust target
              run: |
                  rustup target add $env:WINDOWS_TARGET
                  rustup toolchain install --force-non-host $env:WINDOWS_TOOLCHAIN

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Install dependencies
              run: pnpm install

            - name: Code format
              run: pnpm prettier --write .

            - name: Build and package
              run: |
                  $env:TAURI_SIGNING_PRIVATE_KEY="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
                  $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD="${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"
                  pnpm tauri build -b nsis,updater --target $env:WINDOWS_TARGET
                  Rename-Item .\src-tauri\target\${env:WINDOWS_TARGET}\release\bundle\nsis\NeoPot_${{needs.change-version.outputs.version}}_${env:WINDOWS_ARCH}-setup.exe neopot_${{needs.change-version.outputs.version}}_${env:WINDOWS_ARCH}-setup.exe
                  Rename-Item .\src-tauri\target\${env:WINDOWS_TARGET}\release\bundle\nsis\NeoPot_${{needs.change-version.outputs.version}}_${env:WINDOWS_ARCH}-setup.exe.sig neopot_${{needs.change-version.outputs.version}}_${env:WINDOWS_ARCH}-setup.exe.sig

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: windows_x86_64-pc-windows-msvc
                  path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*setup*
                  if-no-files-found: error

            - name: Upload release assets
              if: startsWith(github.ref, 'refs/tags')
              uses: softprops/action-gh-release@v1
              with:
                  body_path: CHANGELOG
                  token: ${{ secrets.GITHUB_TOKEN }}
                  overwrite_files: true
                  files: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*setup*

    build-for-windows-fix-runtime:
        needs: change-version
        runs-on: windows-latest
        env:
            WINDOWS_ARCH: x64
            WINDOWS_TARGET: x86_64-pc-windows-msvc
            WINDOWS_TOOLCHAIN: stable-x86_64-pc-windows-msvc
        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: source

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Install Rust target
              run: |
                  rustup target add $env:WINDOWS_TARGET
                  rustup toolchain install --force-non-host $env:WINDOWS_TOOLCHAIN

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Install dependencies
              run: pnpm install

            - name: Code format
              run: pnpm prettier --write .

            - name: Download WebView2 runtime
              run: |
                  Invoke-WebRequest -Uri https://github.com/westinyang/WebView2RuntimeArchive/releases/download/109.0.1518.78/Microsoft.WebView2.FixedVersionRuntime.109.0.1518.78.${env:WINDOWS_ARCH}.cab -OutFile Microsoft.WebView2.FixedVersionRuntime.109.0.1518.78.${env:WINDOWS_ARCH}.cab
                  Expand .\Microsoft.WebView2.FixedVersionRuntime.109.0.1518.78.${env:WINDOWS_ARCH}.cab -F:* ./src-tauri
                  Remove-Item .\src-tauri\tauri.windows.conf.json
                  Rename-Item .\src-tauri\webview.${env:WINDOWS_ARCH}.json tauri.windows.conf.json

            - name: Build and package
              run: |
                  $env:TAURI_SIGNING_PRIVATE_KEY="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
                  $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD="${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"
                  pnpm tauri build -b nsis,updater --target $env:WINDOWS_TARGET
                  Rename-Item .\src-tauri\target\${env:WINDOWS_TARGET}\release\bundle\nsis\NeoPot_${{needs.change-version.outputs.version}}_${env:WINDOWS_ARCH}-setup.exe neopot_${{needs.change-version.outputs.version}}_${env:WINDOWS_ARCH}_fix_webview2_runtime-setup.exe
                  Rename-Item .\src-tauri\target\${env:WINDOWS_TARGET}\release\bundle\nsis\NeoPot_${{needs.change-version.outputs.version}}_${env:WINDOWS_ARCH}-setup.exe.sig neopot_${{needs.change-version.outputs.version}}_${env:WINDOWS_ARCH}_fix_webview2_runtime-setup.exe.sig

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: windows_fix_webview_runtime_x86_64-pc-windows-msvc
                  path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*setup*
                  if-no-files-found: error

            - name: Upload release assets
              if: startsWith(github.ref, 'refs/tags')
              uses: softprops/action-gh-release@v1
              with:
                  body_path: CHANGELOG
                  token: ${{ secrets.GITHUB_TOKEN }}
                  overwrite_files: true
                  files: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*setup*

    build-for-linux:
        needs: change-version
        runs-on: ubuntu-latest
        env:
            LINUX_TARGET: x86_64-unknown-linux-gnu
            LINUX_TOOLCHAIN: stable-x86_64-unknown-linux-gnu
        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: source

            - name: Build for Linux
              uses: ./.github/actions/build-for-linux
              env:
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  target: ${{ env.LINUX_TARGET }}
                  toolchain: ${{ env.LINUX_TOOLCHAIN }}

            - name: Normalize Linux artifact names
              run: |
                  for file in src-tauri/target/${{ env.LINUX_TARGET }}/release/bundle/{deb,rpm,appimage}/NeoPot_*; do
                    [ -e "$file" ] || continue
                    dir="$(dirname "$file")"
                    base="$(basename "$file")"
                    mv "$file" "$dir/${base/NeoPot_/neopot_}"
                  done

            - name: Upload deb artifact
              uses: actions/upload-artifact@v4
              with:
                  name: linux_x86_64-unknown-linux-gnu_deb
                  path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
                  if-no-files-found: error

            - name: Upload rpm artifact
              uses: actions/upload-artifact@v4
              with:
                  name: linux_x86_64-unknown-linux-gnu_rpm
                  path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
                  if-no-files-found: error

            - name: Upload AppImage artifact
              uses: actions/upload-artifact@v4
              with:
                  name: linux_x86_64-unknown-linux-gnu_appimage
                  path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage*
                  if-no-files-found: error

            - name: Upload AppImage release assets
              if: startsWith(github.ref, 'refs/tags')
              uses: softprops/action-gh-release@v1
              with:
                  body_path: CHANGELOG
                  token: ${{ secrets.GITHUB_TOKEN }}
                  overwrite_files: true
                  files: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage*

            - name: Upload deb release assets
              if: startsWith(github.ref, 'refs/tags')
              uses: softprops/action-gh-release@v1
              with:
                  body_path: CHANGELOG
                  token: ${{ secrets.GITHUB_TOKEN }}
                  overwrite_files: true
                  files: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb

            - name: Upload rpm release assets
              if: startsWith(github.ref, 'refs/tags')
              uses: softprops/action-gh-release@v1
              with:
                  body_path: CHANGELOG
                  token: ${{ secrets.GITHUB_TOKEN }}
                  overwrite_files: true
                  files: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm

    release-update:
        needs: [build-for-windows, build-for-linux, build-for-windows-fix-runtime]
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags')
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Resolve version
              run: |
                  VERSION="$(git describe --tags | sed 's/-[0-9]*-.*//g' | sed 's/^v//')"
                  echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
                  echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
                  echo "VERSION=${VERSION}"

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install dependencies
              run: pnpm install

            - name: Release updater files
              run: |
                  pnpm run updater
                  pnpm run updater:fixRuntime
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload updater metadata
              uses: softprops/action-gh-release@v1
              with:
                  body: ${{ env.VERSION }}
                  tag_name: updater
                  token: ${{ secrets.GITHUB_TOKEN }}
                  overwrite_files: true
                  files: |
                      update.json
                      update-fix-runtime.json
