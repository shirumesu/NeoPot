name: Package

on:
    push:
        branches: [master]
        tags: ['v*']

permissions: write-all

jobs:
    change-version:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.outputstep.outputs.VERSION }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Resolve version
              id: outputstep
              run: |
                  VERSION="$(git describe --tags | sed 's/-[0-9]*-.*//g' | sed 's/^v//')"
                  echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Change version
              run: |
                  VERSION="${{ steps.outputstep.outputs.VERSION }}"

                  tmp="$(mktemp)"
                  jq --arg version "$VERSION" '.version = $version' package.json > "$tmp" && mv "$tmp" package.json

                  tmp="$(mktemp)"
                  jq --arg version "$VERSION" '.version = $version' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json

                  sed -i "0,/version = \".*\"/s//version = \"${VERSION}\"/" src-tauri/Cargo.toml

                  echo "${VERSION}"

            - name: Upload source
              uses: actions/upload-artifact@v4
              with:
                  name: source
                  path: ./*
                  include-hidden-files: true
                  if-no-files-found: error

    build-extension:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Build SnipDo extension
              run: |
                  cd .scripts/snipdo
                  bash ./build.sh

            - name: Upload SnipDo artifact
              uses: actions/upload-artifact@v4
              with:
                  name: neopot.pbar
                  path: .scripts/snipdo/neopot.pbar
                  if-no-files-found: error

            - name: Upload SnipDo release asset
              if: startsWith(github.ref, 'refs/tags')
              uses: softprops/action-gh-release@v1
              with:
                  body_path: CHANGELOG
                  token: ${{ secrets.GITHUB_TOKEN }}
                  files: .scripts/snipdo/neopot.pbar

    build-for-windows:
        needs: change-version
        strategy:
            fail-fast: false
            matrix:
                platform: [windows-latest]
                target: [x86_64-pc-windows-msvc, i686-pc-windows-msvc, aarch64-pc-windows-msvc]
                include:
                    - arch: x64
                      target: x86_64-pc-windows-msvc
                      toolchain: stable-x86_64-pc-windows-msvc
                    - arch: x86
                      target: i686-pc-windows-msvc
                      toolchain: stable-i686-pc-windows-msvc
                    - arch: arm64
                      target: aarch64-pc-windows-msvc
                      toolchain: stable-aarch64-pc-windows-msvc
        runs-on: ${{ matrix.platform }}
        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: source

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Install Rust target
              run: |
                  rustup target add ${{ matrix.target }}
                  rustup toolchain install --force-non-host ${{ matrix.toolchain }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Install dependencies
              run: pnpm install

            - name: Code format
              run: pnpm prettier --write .

            - name: Build and package
              run: |
                  $env:TAURI_SIGNING_PRIVATE_KEY="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
                  $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD="${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"
                  pnpm tauri build -b nsis,updater --target ${{ matrix.target }}
                  Rename-Item .\src-tauri\target\${{ matrix.target }}\release\bundle\nsis\NeoPot_${{needs.change-version.outputs.version}}_${{ matrix.arch }}-setup.exe neopot_${{needs.change-version.outputs.version}}_${{ matrix.arch }}-setup.exe
                  Rename-Item .\src-tauri\target\${{ matrix.target }}\release\bundle\nsis\NeoPot_${{needs.change-version.outputs.version}}_${{ matrix.arch }}-setup.exe.sig neopot_${{needs.change-version.outputs.version}}_${{ matrix.arch }}-setup.exe.sig

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: windows_${{ matrix.target }}
                  path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*setup*
                  if-no-files-found: error

            - name: Upload release assets
              if: startsWith(github.ref, 'refs/tags')
              uses: softprops/action-gh-release@v1
              with:
                  body_path: CHANGELOG
                  token: ${{ secrets.GITHUB_TOKEN }}
                  files: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*setup*

    build-for-windows-fix-runtime:
        needs: change-version
        strategy:
            fail-fast: false
            matrix:
                platform: [windows-latest]
                target: [x86_64-pc-windows-msvc, i686-pc-windows-msvc, aarch64-pc-windows-msvc]
                include:
                    - arch: x64
                      target: x86_64-pc-windows-msvc
                      toolchain: stable-x86_64-pc-windows-msvc
                    - arch: x86
                      target: i686-pc-windows-msvc
                      toolchain: stable-i686-pc-windows-msvc
                    - arch: arm64
                      target: aarch64-pc-windows-msvc
                      toolchain: stable-aarch64-pc-windows-msvc
        runs-on: ${{ matrix.platform }}
        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: source

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Install Rust target
              run: |
                  rustup target add ${{ matrix.target }}
                  rustup toolchain install --force-non-host ${{ matrix.toolchain }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Install dependencies
              run: pnpm install

            - name: Code format
              run: pnpm prettier --write .

            - name: Download WebView2 runtime
              run: |
                  Invoke-WebRequest -Uri https://github.com/westinyang/WebView2RuntimeArchive/releases/download/109.0.1518.78/Microsoft.WebView2.FixedVersionRuntime.109.0.1518.78.${{ matrix.arch }}.cab -OutFile Microsoft.WebView2.FixedVersionRuntime.109.0.1518.78.${{ matrix.arch }}.cab
                  Expand .\Microsoft.WebView2.FixedVersionRuntime.109.0.1518.78.${{ matrix.arch }}.cab -F:* ./src-tauri
                  Remove-Item .\src-tauri\tauri.windows.conf.json
                  Rename-Item .\src-tauri\webview.${{ matrix.arch }}.json tauri.windows.conf.json

            - name: Build and package
              run: |
                  $env:TAURI_SIGNING_PRIVATE_KEY="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
                  $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD="${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"
                  pnpm tauri build -b nsis,updater --target ${{ matrix.target }}
                  Rename-Item .\src-tauri\target\${{ matrix.target }}\release\bundle\nsis\NeoPot_${{needs.change-version.outputs.version}}_${{ matrix.arch }}-setup.exe neopot_${{needs.change-version.outputs.version}}_${{ matrix.arch }}_fix_webview2_runtime-setup.exe
                  Rename-Item .\src-tauri\target\${{ matrix.target }}\release\bundle\nsis\NeoPot_${{needs.change-version.outputs.version}}_${{ matrix.arch }}-setup.exe.sig neopot_${{needs.change-version.outputs.version}}_${{ matrix.arch }}_fix_webview2_runtime-setup.exe.sig

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: windows_fix_webview_runtime_${{ matrix.target }}
                  path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*setup*
                  if-no-files-found: error

            - name: Upload release assets
              if: startsWith(github.ref, 'refs/tags')
              uses: softprops/action-gh-release@v1
              with:
                  body_path: CHANGELOG
                  token: ${{ secrets.GITHUB_TOKEN }}
                  files: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*setup*

    build-for-linux:
        needs: change-version
        strategy:
            fail-fast: false
            matrix:
                platform: [ubuntu-latest]
                target:
                    [
                        x86_64-unknown-linux-gnu,
                        i686-unknown-linux-gnu,
                        aarch64-unknown-linux-gnu,
                        armv7-unknown-linux-gnueabihf,
                    ]
                include:
                    - target: x86_64-unknown-linux-gnu
                      toolchain: stable-x86_64-unknown-linux-gnu
                    - target: i686-unknown-linux-gnu
                      toolchain: stable-i686-unknown-linux-gnu
                    - target: aarch64-unknown-linux-gnu
                      toolchain: stable-aarch64-unknown-linux-gnu
                    - target: armv7-unknown-linux-gnueabihf
                      toolchain: stable-armv7-unknown-linux-gnueabihf
        runs-on: ${{ matrix.platform }}
        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: source

            - name: Build for Linux
              uses: ./.github/actions/build-for-linux
              env:
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  target: ${{ matrix.target }}
                  toolchain: ${{ matrix.toolchain }}

            - name: Normalize Linux artifact names
              run: |
                  for file in src-tauri/target/${{ matrix.target }}/release/bundle/{deb,rpm,appimage}/NeoPot_*; do
                    [ -e "$file" ] || continue
                    dir="$(dirname "$file")"
                    base="$(basename "$file")"
                    mv "$file" "$dir/${base/NeoPot_/neopot_}"
                  done

            - name: Upload deb artifact
              uses: actions/upload-artifact@v4
              with:
                  name: linux_${{ matrix.target }}_deb
                  path: src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
                  if-no-files-found: error

            - name: Upload rpm artifact
              uses: actions/upload-artifact@v4
              with:
                  name: linux_${{ matrix.target }}_rpm
                  path: src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
                  if-no-files-found: error

            - name: Upload AppImage artifact
              if: matrix.target == 'x86_64-unknown-linux-gnu'
              uses: actions/upload-artifact@v4
              with:
                  name: linux_${{ matrix.target }}_appimage
                  path: src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage*
                  if-no-files-found: error

            - name: Upload AppImage release assets
              if: startsWith(github.ref, 'refs/tags') && matrix.target == 'x86_64-unknown-linux-gnu'
              uses: softprops/action-gh-release@v1
              with:
                  body_path: CHANGELOG
                  token: ${{ secrets.GITHUB_TOKEN }}
                  files: src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage*

            - name: Upload deb release assets
              if: startsWith(github.ref, 'refs/tags')
              uses: softprops/action-gh-release@v1
              with:
                  body_path: CHANGELOG
                  token: ${{ secrets.GITHUB_TOKEN }}
                  files: src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

            - name: Upload rpm release assets
              if: startsWith(github.ref, 'refs/tags')
              uses: softprops/action-gh-release@v1
              with:
                  body_path: CHANGELOG
                  token: ${{ secrets.GITHUB_TOKEN }}
                  files: src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm

    release-update:
        needs: [build-for-windows, build-for-linux, build-for-windows-fix-runtime]
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags')
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Resolve version
              run: |
                  VERSION="$(git describe --tags | sed 's/-[0-9]*-.*//g' | sed 's/^v//')"
                  echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
                  echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
                  echo "VERSION=${VERSION}"

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install dependencies
              run: pnpm install

            - name: Release updater files
              run: |
                  pnpm run updater
                  pnpm run updater:fixRuntime
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload updater metadata
              uses: softprops/action-gh-release@v1
              with:
                  body: ${{ env.VERSION }}
                  tag_name: updater
                  token: ${{ secrets.GITHUB_TOKEN }}
                  files: |
                      update.json
                      update-fix-runtime.json
